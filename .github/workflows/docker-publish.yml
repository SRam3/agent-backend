name: Build, Test and Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r sales_agent_api/requirements.txt

      - name: Run tests
        env:
          DATABASE_URL: "postgresql+asyncpg://user:pass@localhost:5432/test"
          SALES_AI_SERVICE_TOKEN: "ci-test-token"
          ENV: "dev"
        run: pytest tests/ -v --tb=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./sales_agent_api
          file: ./sales_agent_api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/sales-agent-api:latest,${{ secrets.DOCKER_USERNAME }}/sales-agent-api:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name ca-backend \
            --resource-group rg-backend \
            --image docker.io/${{ secrets.DOCKER_USERNAME }}/sales-agent-api:${{ github.sha }}
          echo "Deployed image: ${{ secrets.DOCKER_USERNAME }}/sales-agent-api:${{ github.sha }}"
